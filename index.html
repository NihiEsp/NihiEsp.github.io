<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nihi | Visuals & Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050505; --text: #f5f5f7; --text-muted: #86868b;
  --surface: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.08);
  --glass: rgba(10, 10, 10, 0.7); --ease: cubic-bezier(0.25, 1, 0.5, 1);
}
[data-theme="light"] { --bg: #f7f5f1; --text: #1d1d1f; --glass: rgba(247, 245, 241, 0.8); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
a { color: inherit; text-decoration: none; }

/* ENTER SCREEN */
#enter-screen {
  position: fixed; inset: 0; z-index: 9999; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 1s var(--ease), visibility 1s;
}
.enter-btn {
  font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text);
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
  padding: 20px; transition: 0.3s;
}
.enter-btn:hover { letter-spacing: 0.4em; opacity: 0.7; }
body.loaded { overflow-y: auto; }
body.loaded #enter-screen { opacity: 0; visibility: hidden; }

/* MAIN CONTENT */
main { opacity: 0; transition: opacity 2s var(--ease); }
body.loaded main { opacity: 1; }

.ambient-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.4; background: radial-gradient(circle, #fff, transparent 70%); }
.orb-1 { width: 60vw; height: 60vw; top: -20%; left: -10%; animation: float 20s infinite alternate ease-in-out; }
@keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(10%, 10%); } }

nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(20px); }
.nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; }
.hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(80px, 15vw, 200px); font-weight: 300; line-height: 0.9; }

.section { padding: 120px 48px; max-width: 1400px; margin: 0 auto; }
.bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; grid-auto-rows: 280px; }
.bento-card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
.card-span-2 { grid-column: span 2; }
.socials { display: flex; justify-content: center; gap: 32px; list-style: none; margin-top: 40px; }
.socials a { font-size: 12px; text-transform: uppercase; color: var(--text-muted); }

/* MUSIC PLAYER */
.music-trigger { position: fixed; bottom: 32px; right: 48px; z-index: 100; padding: 14px 24px; border-radius: 40px; background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(10px); color: var(--text); font-size: 11px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
.music-panel { position: fixed; top: 0; right: -400px; bottom: 0; width: 380px; z-index: 200; background: var(--glass); backdrop-filter: blur(30px); border-left: 1px solid var(--border); padding: 48px 32px; display: flex; flex-direction: column; transition: right 0.6s var(--ease); }
.music-panel.open { right: 0; }
.player-art-wrap { width: 100%; aspect-ratio: 1; border-radius: 20px; background: var(--surface); margin-bottom: 24px; border: 1px solid var(--border); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
.volume-slider { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); margin: 20px 0; outline: none; border-radius: 2px; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--text); border-radius: 50%; cursor: pointer; }

.controls { display: flex; justify-content: center; gap: 24px; align-items: center; }
.play-btn { background: var(--text); color: var(--bg); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
</style>
</head>
<body>

<div id="enter-screen" onclick="startSite()">
  <div class="enter-btn">Enter</div>
</div>

<main>
  <div class="ambient-bg"><div class="orb orb-1"></div></div>
  <nav><div class="nav-logo">Nihi</div></nav>

  <section class="hero">
    <h1 class="hero-title">NIHI</h1>
    <p style="letter-spacing: 0.2em; color: var(--text-muted); margin-top: 20px;">I make things.</p>
  </section>

  <section class="section" id="about">
    <div class="bento">
      <div class="bento-card card-span-2"><h3 style="font-family: 'Cormorant Garamond', serif; font-size: 32px;">Visuals & Management</h3><p style="color:var(--text-muted); margin-top:10px;">Currently learning After Effects & Design.</p></div>
      <div class="bento-card card-span-2"><p style="font-size:12px; text-transform:uppercase; color:var(--text-muted);">Interests</p><p>Fashion • Music • Art • Design</p></div>
    </div>
  </section>

  <section class="section" id="contact" style="text-align:center;">
    <a href="mailto:nihil.us.noodle1@proton.me" style="font-family: 'Cormorant Garamond', serif; font-size: 42px; border-bottom: 1px solid var(--border);">Find me ↗</a>
    <ul class="socials">
      <li><a href="https://discord.com/users/647532622523793429" target="_blank">Discord</a></li>
      <li><a href="https://x.com/NoodleDragon10" target="_blank">Twitter</a></li>
      <li><a href="https://guns.lol/nihi" target="_blank">Guns.lol</a></li>
      <li><a href="https://www.roblox.com/users/570659566/profile" target="_blank">Roblox</a></li>
    </ul>
  </section>
</main>

<button class="music-trigger" onclick="togglePlayer()"><div id="m-dot" style="width:6px; height:6px; background:#86868b; border-radius:50%;"></div> Music</button>

<div class="music-panel" id="m-panel">
  <button style="position:absolute; top:20px; right:20px; font-size:24px; color:var(--text-muted);" onclick="togglePlayer()">×</button>
  <div class="player-art-wrap" id="m-art"><span id="art-placeholder" style="font-size:48px;">♫</span></div>
  <div style="text-align:center; margin-bottom:20px;">
    <div id="s-title" style="font-family:'Cormorant Garamond', serif; font-size:24px; font-weight:600;">Track Title</div>
    <div id="s-artist" style="font-size:12px; color:var(--text-muted);">Artist Name</div>
  </div>
  <input type="range" class="volume-slider" id="v-slider" min="0" max="1" step="0.01" value="0.2">
  <div class="controls">
    <button onclick="prevTrack()" style="font-size:20px; color:var(--text);">⏮</button>
    <button class="play-btn" onclick="togglePlay()" id="play-trigger">▶</button>
    <button onclick="nextTrack()" style="font-size:20px; color:var(--text);">⏭</button>
  </div>
</div>

<audio id="audio-player"></audio>

<script>
// --- CONFIGURATION ---
const TRACKS = [
  { title: 'Khel', artist: 'Khel', file: 'music/khel.mp3', cover: 'music/khel.jpeg' },
  { title: 'Confetti', artist: 'Cannons', file: 'music/confetti.mp3', cover: 'music/confetti.jpeg' },
  { title: 'Spade', artist: 'Spade', file: 'music/spade.mp3', cover: 'music/spade.jpeg' }
];

let isPlaying = false; 
let currentTrack = 0;
const player = document.getElementById('audio-player');
const panel = document.getElementById('m-panel');
const vSlider = document.getElementById('v-slider');

player.volume = 0.2; // Default volume set to 20%

function startSite() {
  document.body.classList.add('loaded');
  loadTrack(0);
  // Auto-play might still be blocked if the "Enter" click wasn't enough 
  // but usually this works perfectly for modern browsers.
  setTimeout(() => { togglePlay(); }, 100);
}

function togglePlayer() { panel.classList.toggle('open'); }

function loadTrack(index) {
  const track = TRACKS[index];
  player.src = track.file;
  document.getElementById('s-title').textContent = track.title;
  document.getElementById('s-artist').textContent = track.artist;
  
  const artWrap = document.getElementById('m-art');
  const placeholder = document.getElementById('art-placeholder');
  
  if (track.cover) {
    artWrap.style.backgroundImage = `url(${track.cover})`;
    placeholder.style.display = 'none';
  } else {
    artWrap.style.backgroundImage = 'none';
    placeholder.style.display = 'block';
  }
  player.load();
}

async function togglePlay() {
  const btn = document.getElementById('play-trigger');
  const dot = document.getElementById('m-dot');
  if (isPlaying) {
    player.pause();
    btn.textContent = '▶';
    dot.style.background = '#86868b';
    isPlaying = false;
  } else {
    try {
      await player.play();
      btn.textContent = '⏸';
      dot.style.background = '#10b981';
      isPlaying = true;
    } catch (e) { 
      console.error("Playback failed: Ensure files exist and you clicked 'Enter'."); 
    }
  }
}

function nextTrack() { currentTrack = (currentTrack + 1) % TRACKS.length; loadTrack(currentTrack); if(isPlaying) player.play(); }
function prevTrack() { currentTrack = (currentTrack - 1 + TRACKS.length) % TRACKS.length; loadTrack(currentTrack); if(isPlaying) player.play(); }

vSlider.addEventListener('input', (e) => { player.volume = e.target.value; });
player.addEventListener('ended', nextTrack);
</script>
</body>
</html>
