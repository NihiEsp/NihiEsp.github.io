<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NihiEsp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0b0b0b;
      color: #e5e5e5;
    }

    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 {
      font-size: 18px;
      letter-spacing: 1px;
    }

    nav a {
      color: #888;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      color: white;
    }

    .hero {
      padding: 120px 40px;
      max-width: 700px;
    }

    .hero h2 {
      font-size: 44px;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    .hero p {
      color: #888;
      font-size: 16px;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 10px 22px;
      border: 1px solid #333;
      color: white;
      text-decoration: none;
      transition: 0.2s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    section {
      padding: 60px 40px;
      border-top: 1px solid #1a1a1a;
    }

    .projects {
      display: grid;
      gap: 20px;
    }

    .card {
      padding: 20px;
      background: #111;
      border: 1px solid #1f1f1f;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #555;
      border-top: 1px solid #1a1a1a;
    }
  </style>
</head>

<body>

<header>
  <h1>NihiEsp</h1>
  <nav>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <h2>NihiEsp</h2>
  <p>I build random things, experiment with ideas, and break stuff just to see how it works.</p>
  <a href="#projects" class="btn">See projects</a>
</div>

<section id="projects">
  <h2>Projects</h2>

  <div class="projects">
    <div class="card">
      <h3>Coming soon</h3>
      <p>Still working on something worth showing.</p>
    </div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Discord / GitHub soon</p>
</section>

<footer>
  © 2026 NihiEsp
</footer>

</body>
</html>
